name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install OpenCode tool dependencies
        run: npm --prefix .opencode ci

      - name: Verify workflow pack structure
        run: ./scripts/verify-pack.sh
